server:
  port: ${PORT:8000}

spring:
  application:
    name: cognalytix-backend

  # JWT + DB-backed users only; do not create Boot's default in-memory user / random password.
  autoconfigure:
    exclude:
      - org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5332/cognalytix}
    username: ${DB_USER:shreyasjoshi}
    password: ${DB_PASS:password}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen3:14b}
          temperature: 0.3
          num-predict: 2048

app:
  jwt:
    secret: ${JWT_SECRET:c3VycHJpc2VsZWF2aW5nZHV0eWJvYXR0cnlyZXBlYXRsb2d0aGlyZGRlY2lkZXJlY2U=}
    access-token-expiry-ms: 900000
    refresh-token-expiry-days: 7
    refresh-storage-secret: ${REFRESH_STORAGE_SECRET:local-dev-only-change-me-use-long-random-and-env-in-prod-006c8e8c}
  security:
    password-pepper: ${PASSWORD_PEPPER:901d57e5b57af0d8ad329fbb88d8146f082ed3f752fa018ae4342e8d003ccfe1}
    admin-allowed-emails: ${ADMIN_ALLOWED_EMAILS:}
  ollama:
    embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

  async:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 100

  # Set to false in tests or when Ollama is unavailable (skips scheduling; beans still load).
  analysis:
    enabled: ${ANALYSIS_ENABLED:true}

  scheduler:
    daily-insight-cron: "0 0 20 * * *"
    weekly-insight-cron: "0 0 0 * * SUN"
    monthly-insight-cron: "0 0 1 1 * *"